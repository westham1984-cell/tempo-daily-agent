name: CoinGecko Daily

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  coingecko-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Install Tempo CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: curl -fsSL https://tempo.xyz/install | bash

      - name: Restore wallet keys
        env:
          TEMPO_KEYS_TOML: ${{ secrets.TEMPO_KEYS_TOML }}
        run: |
          mkdir -p ~/.tempo/wallet
          printf '%s' "$TEMPO_KEYS_TOML" > ~/.tempo/wallet/keys.toml
          chmod 600 ~/.tempo/wallet/keys.toml

      - name: Install tempo-request extension
        run: ~/.tempo/bin/tempo add request

      - name: Fetch top gainers & losers
        env:
          SOCKS5_PROXY: ${{ secrets.TEMPO_PROXY }}
        run: |
          if [ -n "$SOCKS5_PROXY" ]; then
            sudo apt-get install -y proxychains4 -q 2>/dev/null
            PROXY="${SOCKS5_PROXY#socks5://}"
            PUSER="${PROXY%%:*}"
            REST="${PROXY#*:}"
            PPASS="${REST%%@*}"
            PHOSTPORT="${REST#*@}"
            PHOST="${PHOSTPORT%%:*}"
            PPORT="${PHOSTPORT##*:}"
            printf 'strict_chain\nproxy_dns\nquiet_mode\n[ProxyList]\nsocks5  %s  %s  %s  %s\n' \
              "$PHOST" "$PPORT" "$PUSER" "$PPASS" | sudo tee /etc/proxychains4.conf > /dev/null
            RUN_PREFIX="proxychains4"
          else
            RUN_PREFIX=""
          fi
          mkdir -p reports
          DATE=$(date +%F)
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3..."
            if TEMPO_MAX_SPEND=1.00 $RUN_PREFIX ~/.tempo/bin/tempo request -X POST \
              "https://coingecko.mpp.paywithlocus.com/coingecko/top-gainers-losers" \
              --json '{"vs_currency":"usd","duration":"24h","top_coins":"300"}' \
              -o "reports/movers-${DATE}.json"; then
              break
            fi
            [ $attempt -lt 3 ] && sleep 30
          done
          [ -f "reports/movers-${DATE}.json" ]

      - name: Show CoinGecko summary
        run: |
          DATE=$(date +%F)
          echo "## TOP GAINERS (24h)" >> $GITHUB_STEP_SUMMARY
          echo "| Coin | Change | Price |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          jq -r '.data.top_gainers[:5][] | "| \(.symbol | ascii_upcase) | +\(.usd_24h_change | tostring | .[0:6])% | $\(.usd) |"' reports/movers-${DATE}.json >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## TOP LOSERS (24h)" >> $GITHUB_STEP_SUMMARY
          echo "| Coin | Change | Price |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          jq -r '.data.top_losers[:5][] | "| \(.symbol | ascii_upcase) | \(.usd_24h_change | tostring | .[0:7])% | $\(.usd) |"' reports/movers-${DATE}.json >> $GITHUB_STEP_SUMMARY

      - name: Upload CoinGecko report
        uses: actions/upload-artifact@v4
        with:
          name: coingecko-${{ github.run_id }}
          path: reports/
          retention-days: 30
