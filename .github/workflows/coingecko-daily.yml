name: Daily Reports

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coingecko-report:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tempo CLI
        run: curl -fsSL https://tempo.xyz/install | bash

      - name: Restore wallet keys
        env:
          TEMPO_KEYS_TOML: ${{ secrets.TEMPO_KEYS_TOML }}
        run: |
          mkdir -p ~/.tempo/wallet
          printf '%s' "$TEMPO_KEYS_TOML" > ~/.tempo/wallet/keys.toml
          chmod 600 ~/.tempo/wallet/keys.toml

      - name: Fetch top gainers & losers
        run: |
          mkdir -p reports
          DATE=$(date +%F)
          TEMPO_MAX_SPEND=1.00 ~/.tempo/bin/tempo request -X POST \
            "https://coingecko.mpp.paywithlocus.com/coingecko/top-gainers-losers" \
            --json '{"vs_currency":"usd","duration":"24h","top_coins":"300"}' \
            -o "reports/movers-${DATE}.json"

      - name: Show CoinGecko summary
        run: |
          DATE=$(date +%F)
          echo "## TOP GAINERS (24h)" >> $GITHUB_STEP_SUMMARY
          echo "| Coin | Change | Price |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          jq -r '.data.top_gainers[:5][] | "| \(.symbol | ascii_upcase) | +\(.usd_24h_change | tostring | .[0:6])% | $\(.usd) |"' reports/movers-${DATE}.json >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## TOP LOSERS (24h)" >> $GITHUB_STEP_SUMMARY
          echo "| Coin | Change | Price |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          jq -r '.data.top_losers[:5][] | "| \(.symbol | ascii_upcase) | \(.usd_24h_change | tostring | .[0:7])% | $\(.usd) |"' reports/movers-${DATE}.json >> $GITHUB_STEP_SUMMARY

      - name: Upload CoinGecko report
        uses: actions/upload-artifact@v4
        with:
          name: coingecko-${{ github.run_id }}
          path: reports/
          retention-days: 30

  poker-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate poker schedule
        env:
          POCARR_LOGIN: ${{ secrets.POCARR_LOGIN }}
          POCARR_PASSWORD: ${{ secrets.POCARR_PASSWORD }}
        run: |
          python3 generate_schedule.py > schedule.txt
          cat schedule.txt

      - name: Show schedule summary
        run: |
          echo "## Poker Schedule $(date +%d.%m.%Y)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat schedule.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Commit schedule to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.txt
          git diff --cached --quiet && echo "No changes" || git commit -m "Update schedule $(date +%d.%m.%Y)"
          git push
