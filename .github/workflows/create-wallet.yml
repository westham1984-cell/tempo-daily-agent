name: Create Tempo Wallet
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile name'
        required: true
        type: choice
        options: [foxtrot, golf, hotel, india, juliet, kilo]

jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Install Tempo CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: curl -fsSL https://tempo.xyz/install | bash

      - name: Login — publish URL via issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source ~/.tempo/env
          PROFILE="${{ github.event.inputs.profile }}"
          TEMPO_BIN="$(which tempo)"
          mkdir -p ~/.tempo-profiles/${PROFILE}/.tempo/wallet
          REAL_HOME="$HOME"
          export HOME=~/.tempo-profiles/${PROFILE}

          $TEMPO_BIN wallet login > /tmp/login.log 2>&1 &
          LOGIN_PID=$!

          for i in $(seq 1 60); do
            URL=$(grep -oE 'https://[^[:space:]]+' /tmp/login.log | head -1)
            if [ -n "$URL" ]; then
              echo "AUTH URL: $URL"
              HOME="$REAL_HOME" gh issue create \
                --title "WALLET-AUTH-${PROFILE}-${{ github.run_id }}" \
                --body "$URL" \
                --repo westham1984-cell/tempo-daily-agent || true
              break
            fi
            sleep 1
          done

          wait $LOGIN_PID
          echo "=== login.log ==="
          cat /tmp/login.log

      - name: Show keys.toml
        run: |
          PROFILE="${{ github.event.inputs.profile }}"
          echo "=========================================="
          echo "SECRET NAME: ${PROFILE^^}_KEYS_TOML"
          echo "=========================================="
          cat ~/.tempo-profiles/${PROFILE}/.tempo/wallet/keys.toml
          echo "=========================================="

      - name: Upload keys as artifact
        uses: actions/upload-artifact@v4
        with:
          name: keys-${{ github.event.inputs.profile }}
          path: ~/.tempo-profiles/${{ github.event.inputs.profile }}/.tempo/wallet/keys.toml
          retention-days: 1
